<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Người Dùng</title>
</head>
<style>
    /* Reset CSS */
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    padding: 0;
    background-color: #f4f4f4;
    color: #333;
}

/* Tiêu đề chính */
h2 {
    text-align: center;
    color: #333;
}

/* Bảng danh sách user */
table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    margin-top: 20px;
}

th, td {
    padding: 10px;
    border: 1px solid #ddd;
    text-align: left;
}

th {
    background-color: #007bff;
    color: white;
    text-transform: uppercase;
}

tr:nth-child(even) {
    background-color: #f9f9f9;
}

tr:hover {
    background-color: #f1f1f1;
}

/* Form container */
.form-container {
    width: 50%;
    background: white;
    padding: 20px;
    margin: 20px auto;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

/* Form tiêu đề */
h3 {
    text-align: center;
    color: #333;
}

/* Form input */
form {
    display: flex;
    flex-direction: column;
}

label {
    font-weight: bold;
    margin-bottom: 5px;
}

input, select {
    padding: 8px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

input:focus, select:focus {
    border-color: #007bff;
    outline: none;
}

/* Nút submit */
button {
    background-color: #28a745;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background-color: #218838;
}

/* Responsive */
@media screen and (max-width: 768px) {
    .form-container {
        width: 80%;
    }

    table {
        font-size: 14px;
    }

    th, td {
        padding: 8px;
    }
}

</style>
<body>
    <h2>Quản lý Người Dùng</h2>

    <!-- Bảng hiển thị danh sách user -->
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Quyền</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            <!-- Dữ liệu sẽ được load vào đây -->
        </tbody>
    </table>

    <!-- Form Thêm / Sửa user -->
    <div class="form-container">
        <h3>Thêm / Cập Nhật User</h3>
        <form id="userForm">
            <input type="hidden" id="userId">

            <label for="name">Tên:</label>
            <input type="text" id="name" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" required><br><br>

            <label for="phone">Số điện thoại:</label>
            <input type="text" id="phone" required><br><br>

            <label for="password">Mật khẩu:</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu nếu muốn thay đổi"><br><br>

            <label for="role">Quyền:</label>
            <select id="role">
                <option value="1">User</option>
                <option value="0">Admin</option>
            </select><br><br>

            <button type="submit">Lưu</button>
        </form>
    </div>

    <script src="../src/admin/qlUser.js"></script>
</body>
</html>
