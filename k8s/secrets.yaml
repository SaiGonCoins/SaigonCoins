apiVersion: v1
kind: Secret
metadata:
  name: saigon-secrets
  labels:
    app: saigon-project
type: Opaque
stringData:
  # Tối ưu: Tách các thông tin nhạy cảm để dễ quản lý và tái sử dụng
  MONGO_URI: "mongodb://mongodb:27017/SaigonCoins"
  
  # Khuyên dùng: Nếu sau này bạn thêm tài khoản cho MongoDB
  # MONGO_USER: "admin"
  # MONGO_PASS: "your_secure_password"
  
  # Các Secret khác cho JWT hoặc API Key (nếu có)
  # JWT_SECRET: "chuoi_bi_mat_rat_dai_va_kho_doan"