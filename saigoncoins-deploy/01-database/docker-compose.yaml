version: '3.8'
name: saigon-db

services:
  mongodb:
    image: mongo:latest
    container_name: saigon-mongodb
    hostname: saigon-mongodb
    volumes:
      - mongo_data:/data/db
      - ../../backup_data:/data/backup:ro 
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ncc_network
    restart: always
  mongodb-backup:
    image: mongo:latest
    container_name: saigon-mongodb-backup
    hostname: saigon-mongodb-backup
    volumes:
      - ../../backup_data:/data/backup
    entrypoint: >
      /bin/sh -c '
      while true; do
        echo "Starting backup at $$(date)";
        mongodump --host saigon-mongodb --db SaigonCoins --out /data/backup/$$(date +%Y-%m-%d_%H-%M);
        echo "Backup finished. Waiting 24 hours...";
        sleep 86400;
      done'
    networks:
      - ncc_network
    restart: always
    depends_on:
      - mongodb

networks:
  ncc_network:
    external: true

volumes:
  mongo_data: